<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Goku</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@latest/dist/css/bootstrap.min.css" rel="stylesheet" />
  </head>
  <body class="bg-light">
    <main class="container py-4">
      <header class="d-flex flex-wrap gap-3 justify-content-between align-items-center mb-3">
        <div class="d-flex align-items-center gap-3">
          <img src="/static/logo.png" alt="goku" width="42" height="42" />
          <div>
            <h1 class="h4 mb-0">Goku</h1>
          </div>
        </div>
        <div class="d-flex gap-2">
          <button class="btn btn-primary" type="button" data-bs-toggle="modal" data-bs-target="#addAliasModal">
            +New golink
          </button>
          {{ if .ShowLogout }}
          <form method="post" action="/logout">
            <button type="submit" class="btn btn-outline-secondary">Log out</button>
          </form>
          {{ end }}
        </div>
      </header>

      <section class="card mb-3">
        <div class="card-body">
          <label for="alias-search" class="form-label mb-1">Search golinks</label>
          <input id="alias-search" class="form-control" placeholder="Type to filter golinks" />
        </div>
      </section>

      <section class="card overflow-hidden">
        <div class="table-responsive">
          <table class="table table-striped table-hover align-middle mb-0">
            <thead>
              <tr>
                <th>
                  <button
                    type="button"
                    class="btn p-0 border-0 bg-transparent text-body-emphasis text-decoration-none fw-semibold sort-col"
                    data-sort-key="alias"
                  >
                    Alias
                  </button>
                </th>
                <th>
                  <button
                    type="button"
                    class="btn p-0 border-0 bg-transparent text-body-emphasis text-decoration-none fw-semibold sort-col"
                    data-sort-key="destination"
                  >
                    Destination
                  </button>
                </th>
                <th>
                  <button
                    type="button"
                    class="btn p-0 border-0 bg-transparent text-body-emphasis text-decoration-none fw-semibold sort-col"
                    data-sort-key="enabled"
                  >
                    Enabled
                  </button>
                </th>
                <th class="text-end">Actions</th>
              </tr>
            </thead>
            <tbody id="alias-body">
              {{ if .Aliases }} {{ range .Aliases }}
              <tr
                data-row
                data-alias="{{ .Alias }}"
                data-destination="{{ .Destination }}"
                data-enabled="{{ if .IsEnabled }}1{{ else }}0{{ end }}"
                class="{{ if not .IsEnabled }}table-secondary{{ end }}"
              >
                <td>
                  <a
                    href="{{ if $.PreviewBaseURL }}{{ $.PreviewBaseURL }}{{ end }}/preview?alias={{ .Alias | urlquery }}"
                    target="_blank"
                    rel="noopener noreferrer"
                    class="link-body-emphasis"
                  >
                    <code>{{ .Alias }}</code>
                  </a>
                </td>
                <td class="text-break">
                  <a href="{{ .Destination }}" target="_blank" rel="noopener noreferrer">{{ .Destination }}</a>
                </td>
                <td>
                  <form
                    method="post"
                    action="/api/aliases/toggle"
                    class="d-inline-flex align-items-center alias-toggle-form"
                  >
                    <input type="hidden" name="alias" value="{{ .Alias }}" />
                    <input
                      type="hidden"
                      name="enabled"
                      value="{{ if .IsEnabled }}1{{ else }}0{{ end }}"
                      class="enabled-value"
                    />
                    <div class="form-check form-switch m-0">
                      <input
                        type="checkbox"
                        class="form-check-input alias-toggle-input"
                        role="switch"
                        aria-label="Toggle {{ .Alias }}"
                        {{
                        if
                        .IsEnabled
                        }}checked{{
                        end
                        }}
                      />
                    </div>
                  </form>
                </td>
                <td class="text-end">
                  <button
                    type="button"
                    class="btn btn-sm btn-outline-primary edit-alias"
                    data-bs-toggle="modal"
                    data-bs-target="#editAliasModal"
                    data-alias="{{ .Alias }}"
                    data-destination="{{ .Destination }}"
                    data-enabled="{{ if .IsEnabled }}1{{ else }}0{{ end }}"
                  >
                    Edit
                  </button>
                  <form method="post" action="/api/aliases/delete" class="d-inline">
                    <input type="hidden" name="alias" value="{{ .Alias }}" />
                    <button type="submit" class="btn btn-sm btn-outline-danger">Delete</button>
                  </form>
                </td>
              </tr>
              {{ end }} {{ else }}
              <tr>
                <td colspan="4" class="text-muted">No golinks configured yet.</td>
              </tr>
              {{ end }}
            </tbody>
          </table>
        </div>
        <div class="card-footer text-muted small">Total golinks: {{ .AliasCount }}</div>
      </section>
    </main>

    <div class="modal fade" id="addAliasModal" tabindex="-1" aria-labelledby="addAliasModalLabel" aria-hidden="true">
      <div class="modal-dialog">
        <div class="modal-content">
          <form method="post" action="/api/aliases">
            <div class="modal-header">
              <h2 class="modal-title fs-5" id="addAliasModalLabel">Add golink</h2>
              <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
              <div class="mb-3">
                <label class="form-label" for="alias-input">Alias</label>
                <input id="alias-input" name="alias" class="form-control" placeholder="gh/{owner}/{repo}" required />
              </div>
              <div>
                <label class="form-label" for="destination-input">Destination</label>
                <input
                  id="destination-input"
                  name="destination"
                  class="form-control"
                  placeholder="https://github.com/{owner}/{repo}"
                  required
                />
              </div>
            </div>
            <div class="modal-footer">
              <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Cancel</button>
              <button type="submit" class="btn btn-primary">Save golink</button>
            </div>
          </form>
        </div>
      </div>
    </div>

    <div class="modal fade" id="editAliasModal" tabindex="-1" aria-labelledby="editAliasModalLabel" aria-hidden="true">
      <div class="modal-dialog">
        <div class="modal-content">
          <form method="post" action="/api/aliases/edit" id="edit-alias-form">
            <div class="modal-header">
              <h2 class="modal-title fs-5" id="editAliasModalLabel">Edit golink</h2>
              <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
              <input type="hidden" id="edit-old-alias" name="old_alias" />
              <div class="mb-3">
                <label class="form-label" for="edit-alias-input">Alias</label>
                <input id="edit-alias-input" name="alias" class="form-control" required />
              </div>
              <div class="mb-3">
                <label class="form-label" for="edit-destination-input">Destination</label>
                <input id="edit-destination-input" name="destination" class="form-control" required />
              </div>
              <div class="form-check">
                <input type="hidden" id="edit-enabled-hidden" name="enabled" value="0" />
                <input class="form-check-input" type="checkbox" id="edit-enabled-check" value="1" />
                <label class="form-check-label" for="edit-enabled-check">Enabled</label>
              </div>
            </div>
            <div class="modal-footer">
              <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Cancel</button>
              <button type="submit" class="btn btn-primary">Save changes</button>
            </div>
          </form>
        </div>
      </div>
    </div>

    <script>
      const search = document.getElementById('alias-search');
      const aliasBody = document.getElementById('alias-body');
      const rows = Array.from(document.querySelectorAll('[data-row]'));
      const sortButtons = Array.from(document.querySelectorAll('.sort-col'));
      const sortState = { key: 'alias', direction: 'asc' };

      function fuzzy(q, s) {
        q = q.toLowerCase().trim();
        s = s.toLowerCase();
        if (!q) return true;
        if (s.includes(q)) return true;
        let qi = 0;
        for (let i = 0; i < s.length && qi < q.length; i++) {
          if (s[i] === q[qi]) qi++;
        }
        return qi === q.length;
      }

      function filterRows() {
        const q = search.value;
        rows.forEach((row) => {
          const text = row.dataset.alias + ' ' + row.dataset.destination;
          row.style.display = fuzzy(q, text) ? '' : 'none';
        });
      }

      function sortValue(row, key) {
        if (key === 'enabled') {
          return row.dataset.enabled === '1' ? 1 : 0;
        }
        return (row.dataset[key] || '').toLowerCase();
      }

      function updateSortButtonLabels() {
        sortButtons.forEach((button) => {
          const key = button.dataset.sortKey;
          const label = button.textContent.replace(/\s+[↑↓]$/, '');
          if (key === sortState.key) {
            button.textContent = label + (sortState.direction === 'asc' ? ' ↑' : ' ↓');
            return;
          }
          button.textContent = label;
        });
      }

      function sortRows() {
        rows.sort((a, b) => {
          const av = sortValue(a, sortState.key);
          const bv = sortValue(b, sortState.key);
          let cmp = 0;

          if (typeof av === 'number' && typeof bv === 'number') {
            cmp = av - bv;
          } else {
            cmp = String(av).localeCompare(String(bv));
          }

          return sortState.direction === 'asc' ? cmp : -cmp;
        });

        rows.forEach((row) => aliasBody.appendChild(row));
        updateSortButtonLabels();
        filterRows();
      }

      const editButtons = Array.from(document.querySelectorAll('.edit-alias'));
      const oldAliasInput = document.getElementById('edit-old-alias');
      const aliasInput = document.getElementById('edit-alias-input');
      const destinationInput = document.getElementById('edit-destination-input');
      const enabledCheck = document.getElementById('edit-enabled-check');
      const enabledHidden = document.getElementById('edit-enabled-hidden');
      const aliasToggleInputs = Array.from(document.querySelectorAll('.alias-toggle-input'));
      const deleteForms = Array.from(document.querySelectorAll('form[action="/api/aliases/delete"]'));

      function syncEnabledValue() {
        enabledHidden.value = enabledCheck.checked ? '1' : '0';
      }

      editButtons.forEach((button) => {
        button.addEventListener('click', () => {
          oldAliasInput.value = button.dataset.alias || '';
          aliasInput.value = button.dataset.alias || '';
          destinationInput.value = button.dataset.destination || '';
          enabledCheck.checked = button.dataset.enabled === '1';
          syncEnabledValue();
        });
      });

      enabledCheck.addEventListener('change', syncEnabledValue);

      aliasToggleInputs.forEach((input) => {
        input.addEventListener('change', () => {
          const form = input.closest('form');
          if (!form) return;
          const enabledValue = form.querySelector('.enabled-value');
          if (!enabledValue) return;
          enabledValue.value = input.checked ? '1' : '0';
          form.submit();
        });
      });

      deleteForms.forEach((form) => {
        form.addEventListener('submit', (event) => {
          const aliasField = form.querySelector('input[name="alias"]');
          const alias = (aliasField && aliasField.value) || 'this golink';
          const ok = window.confirm(`Delete golink "${alias}"?\n\nPress Enter to confirm.`);
          if (!ok) {
            event.preventDefault();
          }
        });
      });

      sortButtons.forEach((button) => {
        button.addEventListener('click', () => {
          const key = button.dataset.sortKey;
          if (sortState.key === key) {
            sortState.direction = sortState.direction === 'asc' ? 'desc' : 'asc';
          } else {
            sortState.key = key;
            sortState.direction = 'asc';
          }
          sortRows();
        });
      });

      search.addEventListener('input', filterRows);
      updateSortButtonLabels();
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@latest/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
