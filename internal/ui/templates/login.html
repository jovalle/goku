<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@latest/dist/css/bootstrap.min.css" rel="stylesheet" />
  </head>
  <body class="bg-light">
    <main class="container min-vh-100 d-flex align-items-center py-3">
      <div class="row justify-content-center w-100">
        <section class="col-12 col-sm-10 col-md-5 col-lg-4">
          <div class="card shadow-sm">
            <div class="card-body p-3 p-md-4">
              <div class="d-flex align-items-center gap-2 mb-3">
                <img src="/static/logo.png" alt="goku" width="40" height="40" />
                <h1 class="h4 mb-0">Goku</h1>
              </div>
              <form
                method="post"
                action="/login"
                id="login-form"
                novalidate
                data-state="{{ if .Invalid }}invalid{{ else }}idle{{ end }}"
              >
                <div class="d-flex align-items-start gap-2">
                  <div class="flex-grow-1">
                    <input
                      id="password"
                      name="password"
                      type="password"
                      class="form-control"
                      placeholder="Password"
                      autocomplete="current-password"
                      required
                      minlength="1"
                      autofocus
                    />
                    <div class="invalid-feedback">Password is required.</div>
                    {{ if .Invalid }}
                    <div class="invalid-feedback d-block">Wrong password.</div>
                    {{ end }}
                  </div>
                  <button type="submit" class="btn btn-primary text-nowrap">Log in</button>
                </div>

                <div class="mt-3 d-flex justify-content-center">
                  <div class="form-check">
                    <input class="form-check-input" type="checkbox" name="remember" id="remember" />
                    <label class="form-check-label" for="remember">Keep me logged in</label>
                  </div>
                </div>
              </form>
            </div>
          </div>
        </section>
      </div>
    </main>
    <script>
      const form = document.getElementById('login-form');
      const password = document.getElementById('password');

      form.addEventListener('submit', (event) => {
        if (!password.checkValidity()) {
          event.preventDefault();
          event.stopPropagation();
          password.classList.add('is-invalid');
          return;
        }

        password.classList.remove('is-invalid');
      });

      password.addEventListener('input', () => {
        if (password.checkValidity()) {
          password.classList.remove('is-invalid');
        }
      });
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@latest/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
