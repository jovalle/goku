<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Goku Command Center</title>
    <style>
      :root {
        --bg: #0e1116;
        --bg-soft: #161b22;
        --panel: #0f141c;
        --line: #253041;
        --text: #dde6f4;
        --muted: #93a6be;
        --accent: #4ade80;
        --accent-2: #38bdf8;
        --danger: #fb7185;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        padding: 24px;
        font-family:
          ui-sans-serif,
          -apple-system,
          Segoe UI,
          Helvetica,
          Arial,
          sans-serif;
        background: radial-gradient(circle at 20% -10%, #1a2440, transparent 40%), var(--bg);
        color: var(--text);
      }
      .wrap {
        max-width: 1100px;
        margin: 0 auto;
      }
      .head {
        display: flex;
        gap: 16px;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 16px;
      }
      .brand {
        display: flex;
        align-items: center;
        gap: 12px;
      }
      .brand img {
        width: 44px;
        height: 44px;
      }
      h1 {
        margin: 0;
        font-size: 1.3rem;
      }
      .muted {
        color: var(--muted);
        font-size: 0.95rem;
      }
      .row {
        display: grid;
        gap: 12px;
        grid-template-columns: 1fr 1fr auto;
        margin: 12px 0 18px;
      }
      input {
        width: 100%;
        border: 1px solid var(--line);
        background: var(--bg-soft);
        color: var(--text);
        border-radius: 10px;
        padding: 10px 12px;
      }
      button {
        border: 0;
        border-radius: 10px;
        padding: 10px 14px;
        color: #071111;
        background: linear-gradient(120deg, var(--accent), var(--accent-2));
        font-weight: 600;
        cursor: pointer;
      }
      table {
        width: 100%;
        border-collapse: collapse;
        border: 1px solid var(--line);
        border-radius: 12px;
        overflow: hidden;
        background: var(--panel);
      }
      th,
      td {
        text-align: left;
        border-bottom: 1px solid var(--line);
        padding: 10px 12px;
        font-size: 0.93rem;
      }
      th {
        color: var(--muted);
        font-weight: 600;
      }
      td code {
        color: #fcd34d;
      }
      .actions {
        display: flex;
        gap: 8px;
        justify-content: flex-end;
      }
      .danger {
        background: transparent;
        border: 1px solid var(--danger);
        color: #fecdd3;
      }
      .toolbar {
        display: flex;
        gap: 12px;
        margin-bottom: 12px;
        align-items: center;
      }
      .hint {
        color: var(--muted);
        font-size: 0.86rem;
      }
      .right {
        margin-left: auto;
      }
      @media (max-width: 800px) {
        body {
          padding: 16px;
        }
        .row {
          grid-template-columns: 1fr;
        }
        .toolbar {
          flex-direction: column;
          align-items: stretch;
        }
      }
    </style>
  </head>
  <body>
    <main class="wrap">
      <header class="head">
        <div class="brand">
          <img src="/static/logo.png" alt="goku" />
          <div>
            <h1>Goku Command Center</h1>
            <div class="muted">Golink Directory: {{ .AliasCount }} golinks</div>
          </div>
        </div>
        <form method="post" action="/logout"><button type="submit" class="danger">Log out</button></form>
      </header>

      <form class="row" method="post" action="/api/aliases">
        <input name="alias" placeholder="alias pattern (e.g. gh/{owner}/{repo} or r/{})" required />
        <input name="destination" placeholder="destination (e.g. https://github.com/{owner}/{repo})" required />
        <button type="submit">Save golink</button>
      </form>

      <section class="toolbar">
        <input id="alias-search" placeholder="Fuzzy search golinks. Quick add: alias https://destination then Enter" />
        <span class="hint right">Tip: one placeholder may be {}; multiple placeholders must be unique names.</span>
      </section>

      <table>
        <thead>
          <tr>
            <th>Alias</th>
            <th>Destination</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="alias-body">
          {{ if .Aliases }} {{ range .Aliases }}
          <tr data-row data-alias="{{ .Alias }}" data-destination="{{ .Destination }}">
            <td><code>{{ .Alias }}</code></td>
            <td>{{ .Destination }}</td>
            <td>
              <div class="actions">
                <form method="post" action="/api/aliases/delete">
                  <input type="hidden" name="alias" value="{{ .Alias }}" />
                  <button type="submit" class="danger">Delete</button>
                </form>
              </div>
            </td>
          </tr>
          {{ end }} {{ else }}
          <tr>
            <td colspan="3" class="muted">No golinks configured yet.</td>
          </tr>
          {{ end }}
        </tbody>
      </table>
    </main>

    <form id="quick-add" method="post" action="/api/aliases" style="display: none">
      <input name="alias" id="quick-alias" />
      <input name="destination" id="quick-destination" />
    </form>

    <script>
      const search = document.getElementById('alias-search');
      const rows = Array.from(document.querySelectorAll('[data-row]'));

      function fuzzy(q, s) {
        q = q.toLowerCase().trim();
        s = s.toLowerCase();
        if (!q) return true;
        if (s.includes(q)) return true;
        let qi = 0;
        for (let i = 0; i < s.length && qi < q.length; i++) {
          if (s[i] === q[qi]) qi++;
        }
        return qi === q.length;
      }

      function filterRows() {
        const q = search.value;
        rows.forEach((row) => {
          const text = row.dataset.alias + ' ' + row.dataset.destination;
          row.style.display = fuzzy(q, text) ? '' : 'none';
        });
      }

      function parseQuickAdd(value) {
        const parts = value.trim().split(/\s+/);
        if (parts.length < 2) return null;
        const alias = parts[0];
        const destination = parts.slice(1).join(' ');
        if (!/^https?:\/\//i.test(destination)) return null;
        return { alias, destination };
      }

      search.addEventListener('input', filterRows);
      search.addEventListener('keydown', (event) => {
        if (event.key !== 'Enter') return;
        const parsed = parseQuickAdd(search.value);
        if (!parsed) return;
        event.preventDefault();
        document.getElementById('quick-alias').value = parsed.alias;
        document.getElementById('quick-destination').value = parsed.destination;
        document.getElementById('quick-add').submit();
      });
    </script>
  </body>
</html>
