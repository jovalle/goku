<!doctype html>
<html lang="en" data-bs-theme="light">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Goku</title>
    <script>
      (() => {
        const storageKey = 'goku-theme';
        let theme = 'light';
        try {
          theme =
            localStorage.getItem(storageKey) ||
            (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
        } catch (err) {
          theme = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
        }
        document.documentElement.setAttribute('data-bs-theme', theme);
      })();
    </script>
    <link rel="icon" type="image/png" sizes="256x256" href="/static/favicon.png?v=2" />
    <link rel="shortcut icon" href="/favicon.ico?v=2" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@latest/dist/css/bootstrap.min.css" rel="stylesheet" />
    <style>
      :root {
        color-scheme: light dark;
      }

      .theme-toggle {
        bottom: 1rem;
        height: 2.5rem;
        position: fixed;
        right: 1rem;
        top: auto;
        width: 2.5rem;
        z-index: 1050;
      }

      .theme-toggle svg {
        height: 1.1rem;
        width: 1.1rem;
      }

      .theme-toggle .theme-icon-light {
        display: none;
      }

      [data-bs-theme='dark'] .theme-toggle .theme-icon-dark {
        display: none;
      }

      [data-bs-theme='dark'] .theme-toggle .theme-icon-light {
        display: inline-block;
      }

      @media (max-width: 767.98px) {
        .theme-toggle {
          bottom: auto;
          top: 1rem;
        }
      }
    </style>
  </head>
  <body class="bg-body-tertiary">
    <button
      type="button"
      class="btn btn-outline-secondary theme-toggle d-inline-flex align-items-center justify-content-center p-0"
      data-theme-toggle
      aria-label="Switch to dark mode"
      title="Switch to dark mode"
    >
      <svg class="theme-icon-dark" viewBox="0 0 24 24" aria-hidden="true" fill="none" stroke="currentColor">
        <path d="M21 12.8A8.5 8.5 0 1 1 11.2 3 7 7 0 0 0 21 12.8Z" />
      </svg>
      <svg class="theme-icon-light" viewBox="0 0 24 24" aria-hidden="true" fill="none" stroke="currentColor">
        <circle cx="12" cy="12" r="4" />
        <path d="M12 2v2" />
        <path d="M12 20v2" />
        <path d="m4.93 4.93 1.41 1.41" />
        <path d="m17.66 17.66 1.41 1.41" />
        <path d="M2 12h2" />
        <path d="M20 12h2" />
        <path d="m6.34 17.66-1.41 1.41" />
        <path d="m19.07 4.93-1.41 1.41" />
      </svg>
      <span class="visually-hidden">Toggle dark mode</span>
    </button>
    <main class="container min-vh-100 d-flex align-items-center py-3">
      <div class="row justify-content-center w-100">
        <section class="col-12 col-sm-10 col-md-5 col-lg-4">
          <div class="card shadow-sm">
            <div class="card-body p-3">
              <div class="d-flex align-items-center gap-2 mb-2">
                <img src="/static/logo.png" alt="goku logo" width="40" height="40" />
                <h1 class="h4 mb-0">Goku</h1>
              </div>
              <div class="list-group">
                <div class="list-group-item d-flex justify-content-between align-items-center">
                  <span>
                    health
                    <a href="/healthz" class="small ms-1">json</a>
                  </span>
                  <span id="health-status" class="badge text-bg-success">{{ .Health.Status }}</span>
                </div>
                <div class="list-group-item d-flex justify-content-between align-items-center">
                  <span>golinks defined</span>
                  <strong id="alias-count">{{ .AliasCount }}</strong>
                </div>
                <div class="list-group-item d-flex justify-content-between align-items-center">
                  <span>uptime</span>
                  <code id="uptime-value">{{ .Health.Uptime }}</code>
                </div>
              </div>
            </div>
          </div>
        </section>
      </div>
    </main>

    <script>
      (() => {
        const storageKey = 'goku-theme';

        function currentTheme() {
          return document.documentElement.getAttribute('data-bs-theme') || 'light';
        }

        function paintThemeToggle(toggle) {
          const isDark = currentTheme() === 'dark';
          const label = isDark ? 'Switch to light mode' : 'Switch to dark mode';
          toggle.setAttribute('aria-label', label);
          toggle.setAttribute('title', label);
        }

        function setTheme(theme) {
          document.documentElement.setAttribute('data-bs-theme', theme);
          try {
            localStorage.setItem(storageKey, theme);
          } catch (err) {}
          document.querySelectorAll('[data-theme-toggle]').forEach(paintThemeToggle);
        }

        document.querySelectorAll('[data-theme-toggle]').forEach((toggle) => {
          paintThemeToggle(toggle);
          toggle.addEventListener('click', () => {
            setTheme(currentTheme() === 'dark' ? 'light' : 'dark');
          });
        });
      })();

      const healthStatusEl = document.getElementById('health-status');
      const aliasCountEl = document.getElementById('alias-count');
      const uptimeEl = document.getElementById('uptime-value');

      function applyHealth(data) {
        const status = String(data.status || 'unknown');
        const isOk = status.toLowerCase() === 'ok';

        healthStatusEl.textContent = status;
        healthStatusEl.className = 'badge ' + (isOk ? 'text-bg-success' : 'text-bg-warning');
        aliasCountEl.textContent = String(data.aliases ?? '-');
        uptimeEl.textContent = String(data.uptime ?? '-');
      }

      async function refreshHealthFallback() {
        try {
          const res = await fetch('/healthz', { cache: 'no-store' });
          if (!res.ok) {
            throw new Error('health fetch failed');
          }
          applyHealth(await res.json());
        } catch (err) {
          healthStatusEl.textContent = 'unreachable';
          healthStatusEl.className = 'badge text-bg-danger';
        }
      }

      function openHealthSocket() {
        const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
        const ws = new WebSocket(protocol + '//' + window.location.host + '/ws/health');

        ws.addEventListener('message', (event) => {
          try {
            const payload = JSON.parse(event.data);
            applyHealth(payload);
          } catch (err) {
            // Ignore malformed payloads and keep the stream alive.
          }
        });

        ws.addEventListener('error', () => {
          refreshHealthFallback();
        });

        ws.addEventListener('close', () => {
          // Reconnect quickly to keep live uptime flowing with one connection.
          setTimeout(openHealthSocket, 1000);
        });
      }

      refreshHealthFallback();
      openHealthSocket();
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@latest/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
