<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Goku</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@latest/dist/css/bootstrap.min.css" rel="stylesheet" />
  </head>
  <body class="bg-light">
    <main class="container min-vh-100 d-flex align-items-center py-3">
      <div class="row justify-content-center w-100">
        <section class="col-12 col-sm-10 col-md-5 col-lg-4">
          <div class="card shadow-sm">
            <div class="card-body p-3">
              <div class="d-flex align-items-center gap-2 mb-2">
                <img src="/static/logo.png" alt="goku logo" width="40" height="40" />
                <h1 class="h4 mb-0">Goku</h1>
              </div>

              <p class="text-muted mb-3">Golinks manager</p>

              <div class="list-group">
                <div class="list-group-item d-flex justify-content-between align-items-center">
                  <span>
                    health
                    <a href="/healthz" class="small ms-1">json</a>
                  </span>
                  <span id="health-status" class="badge text-bg-success">{{ .Health.Status }}</span>
                </div>
                <div class="list-group-item d-flex justify-content-between align-items-center">
                  <span>golinks defined</span>
                  <strong id="alias-count">{{ .AliasCount }}</strong>
                </div>
                <div class="list-group-item d-flex justify-content-between align-items-center">
                  <span>uptime</span>
                  <code id="uptime-value">{{ .Health.Uptime }}</code>
                </div>
              </div>
            </div>
          </div>
        </section>
      </div>
    </main>

    <script>
      const healthStatusEl = document.getElementById('health-status');
      const aliasCountEl = document.getElementById('alias-count');
      const uptimeEl = document.getElementById('uptime-value');

      function applyHealth(data) {
        const status = String(data.status || 'unknown');
        const isOk = status.toLowerCase() === 'ok';

        healthStatusEl.textContent = status;
        healthStatusEl.className = 'badge ' + (isOk ? 'text-bg-success' : 'text-bg-warning');
        aliasCountEl.textContent = String(data.aliases ?? '-');
        uptimeEl.textContent = String(data.uptime ?? '-');
      }

      async function refreshHealthFallback() {
        try {
          const res = await fetch('/healthz', { cache: 'no-store' });
          if (!res.ok) {
            throw new Error('health fetch failed');
          }
          applyHealth(await res.json());
        } catch (err) {
          healthStatusEl.textContent = 'unreachable';
          healthStatusEl.className = 'badge text-bg-danger';
        }
      }

      function openHealthSocket() {
        const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
        const ws = new WebSocket(protocol + '//' + window.location.host + '/ws/health');

        ws.addEventListener('message', (event) => {
          try {
            const payload = JSON.parse(event.data);
            applyHealth(payload);
          } catch (err) {
            // Ignore malformed payloads and keep the stream alive.
          }
        });

        ws.addEventListener('error', () => {
          refreshHealthFallback();
        });

        ws.addEventListener('close', () => {
          // Reconnect quickly to keep live uptime flowing with one connection.
          setTimeout(openHealthSocket, 1000);
        });
      }

      refreshHealthFallback();
      openHealthSocket();
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@latest/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
